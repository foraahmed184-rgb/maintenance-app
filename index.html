<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام طلبات الصيانة</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>نظام طلبات الصيانة</h1>
      <p>تنظيم طلبات الصيانة بين الفريق والعامل</p>
    </div>
    <button id="logoutBtn" class="ghost hidden">خروج</button>
  </header>

  <main>
    <section id="loginView" class="card login-card">
      <h2>الدخول</h2>

      <label for="loginName">اسم المستخدم</label>
      <input id="loginName" type="text" placeholder="اكتب اسمك" />

      <label for="loginRole">نوع الحساب</label>
      <select id="loginRole">
        <option value="member">عضو فريق 👥</option>
        <option value="worker">عامل 🛠️</option>
        <option value="admin">مسؤول 👑</option>
      </select>

      <div id="passwordBox" class="hidden">
        <label for="loginPassword">الرمز</label>
        <input id="loginPassword" type="password" placeholder="اكتب الرمز" />
      </div>

      <button id="loginBtn">دخول</button>
    </section>

    <section id="appView" class="hidden">
      <section class="card user-card">
        <div>
          <div class="muted small">المستخدم الحالي</div>
          <strong id="currentUserName"></strong>
          <span id="currentRoleBadge" class="role-badge"></span>
        </div>
      </section>

      <section class="card">
        <h2>طلب صيانة جديد</h2>

        <label for="titleInput">عنوان المشكلة</label>
        <input id="titleInput" type="text" placeholder="مثلاً: مكيف لا يعمل" />

        <label for="descriptionInput">وصف المشكلة والمكان</label>
        <textarea id="descriptionInput" rows="4" placeholder="اكتب التفاصيل هنا"></textarea>

        <label for="priorityInput">الأولوية</label>
        <select id="priorityInput">
          <option value="عادي">عادي</option>
          <option value="مهم">مهم</option>
          <option value="مستعجل">مستعجل</option>
        </select>

        <label for="imagesInput">صور المشكلة</label>
        <input id="imagesInput" type="file" accept="image/*" multiple />

        <button id="submitRequestBtn">إرسال الطلب</button>
        <p class="muted small">يتم ضغط الصور تلقائيًا. الأفضل رفع 1 إلى 3 صور.</p>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>الطلبات</h2>
          <button id="refreshBtn" class="ghost">تحديث</button>
        </div>
        <div id="requestsList" class="requests-list"></div>
      </section>

      <section class="card">
        <h2>الإشعارات داخل التطبيق</h2>
        <div id="notificationsList" class="notifications-list"></div>
      </section>
    </section>
  </main>

  <div id="imageModal" class="modal hidden">
    <button id="closeModalBtn" class="modal-close">×</button>
    <img id="modalImage" alt="صورة مكبرة" />
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
