<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام طلبات الصيانة</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>نظام طلبات الصيانة</h1>
      <p>إدارة طلبات الصيانة داخل الشركة</p>
    </div>
    <button id="logoutBtn" class="ghost hidden">خروج</button>
  </header>

  <main>
    <section id="loginView" class="card login-card">
      <h2>دخول المستخدم</h2>
      <p class="muted">اكتب اسمك فقط. النظام يحدد الصلاحية تلقائيًا.</p>
      <label>اسمك</label>
      <input id="loginName" type="text" placeholder="مثلاً: أحمد" />
      <button id="loginBtn">دخول</button>
      <div class="hint">
        Ahmed = مسؤول، هارون = عامل، أي اسم آخر = عضو فريق
      </div>
    </section>

    <section id="appView" class="hidden">
      <div class="user-strip card">
        <div>
          <strong id="currentUserName"></strong>
          <span id="currentRoleBadge" class="role-badge"></span>
        </div>
        <button id="enableNotificationsBtn" class="ghost">تفعيل إشعارات المتصفح</button>
      </div>

      <section class="card" id="newRequestCard">
        <h2>طلب صيانة جديد</h2>
        <div class="grid">
          <div>
            <label>عنوان المشكلة</label>
            <input id="titleInput" type="text" placeholder="مثلاً: مكيف لا يعمل" />
          </div>
          <div>
            <label>الأولوية</label>
            <select id="priorityInput">
              <option value="عادي">عادي</option>
              <option value="مهم">مهم</option>
              <option value="مستعجل">مستعجل</option>
            </select>
          </div>
        </div>

        <label>وصف المشكلة</label>
        <textarea id="descriptionInput" rows="4" placeholder="اكتب تفاصيل المشكلة والمكان"></textarea>

        <label>صور المشكلة</label>
        <input id="imagesInput" type="file" accept="image/*" multiple />

        <button id="submitRequestBtn">إرسال الطلب</button>
        <p class="muted small">يتم ضغط الصور تلقائيًا لتجنب مشكلة الحجم.</p>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>الطلبات</h2>
          <button id="refreshBtn" class="ghost">تحديث</button>
        </div>
        <div id="requestsList" class="requests-list"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>الإشعارات داخل التطبيق</h2>
          <button id="clearNotificationsBtn" class="ghost">مسح</button>
        </div>
        <div id="notificationsList" class="notifications-list"></div>
      </section>
    </section>
  </main>

  <div id="imageModal" class="modal hidden">
    <button id="closeModalBtn" class="modal-close">×</button>
    <img id="modalImage" alt="صورة مكبرة" />
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
