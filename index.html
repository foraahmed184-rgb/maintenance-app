<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>نظام طلبات الصيانة</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>نظام طلبات الصيانة</h1>
      <p id="syncStatus">جاري الاتصال...</p>
    </div>
    <button id="logoutBtn" class="ghost hidden">تسجيل خروج</button>
  </header>

  <main class="container">
    <section id="loginView" class="card">
      <h2>تسجيل الدخول</h2>
      <label>اسمك</label>
      <input id="loginName" placeholder="مثال: أحمد" autocomplete="name" />

      <label>الدور</label>
      <select id="loginRole">
        <option value="member">عضو من الفريق</option>
        <option value="worker">عامل الصيانة</option>
        <option value="admin">المسؤول</option>
      </select>

      <div id="pinBox" class="hidden">
        <label>كلمة المرور</label>
        <input id="loginPin" type="password" placeholder="كلمة المرور" />
        <small>المسؤول: 1234 — العامل: 0000</small>
      </div>

      <button id="loginBtn">دخول</button>
      <p class="hint">بعد الدخول، كل الطلبات تظهر للجميع مباشرة.</p>
    </section>

    <section id="appView" class="hidden">
      <section class="card userCard">
        <div>
          <h2 id="welcomeText">مرحباً</h2>
          <p id="roleText"></p>
        </div>
        <button id="notifyBtn" class="secondary">تفعيل إشعارات المتصفح</button>
      </section>

      <section id="requestFormCard" class="card">
        <h2>إرسال طلب صيانة</h2>
        <div class="grid">
          <div>
            <label>عنوان الطلب</label>
            <input id="titleInput" placeholder="مثال: تسريب ماء في المطبخ" />
          </div>
          <div>
            <label>الموقع / القسم</label>
            <input id="locationInput" placeholder="مثال: الدور الثاني - المكتب 5" />
          </div>
        </div>

        <label>أهمية الطلب</label>
        <select id="priorityInput">
          <option value="normal">عادي</option>
          <option value="important">مهم</option>
          <option value="urgent">مستعجل</option>
        </select>

        <label>وصف المشكلة</label>
        <textarea id="descInput" rows="4" placeholder="اكتب تفاصيل المشكلة"></textarea>

        <label>صور المشكلة (اختياري)</label>
        <input id="beforeImages" type="file" accept="image/*" multiple />
        <small>ملاحظة: الصور تحفظ داخل الطلب، اختار صور واضحة وحجمها معقول.</small>

        <button id="submitRequestBtn">إرسال الطلب</button>
      </section>

      <section class="card">
        <div class="sectionHead">
          <h2>الطلبات</h2>
          <div class="filters">
            <select id="filterStatus">
              <option value="all">كل الحالات</option>
              <option value="new">جديد</option>
              <option value="in_progress">قيد التنفيذ</option>
              <option value="done">تم التنفيذ</option>
              <option value="cancelled">ملغي</option>
            </select>
          </div>
        </div>
        <div id="requestsList" class="requestsList"></div>
      </section>

      <section class="card">
        <h2>الإشعارات داخل التطبيق</h2>
        <div id="notificationsList" class="notificationsList"></div>
      </section>
    </section>
  </main>

  <div id="imageModal" class="modal hidden">
    <button id="closeModal" class="modalClose">×</button>
    <img id="modalImg" alt="صورة مكبرة" />
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
