<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>نظام طلبات الصيانة</title>
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<header><div><h1>نظام طلبات الصيانة</h1><p>طلبات الفريق والعامل في مكان واحد</p></div></header>
<main>
<section id="loginCard" class="card"><h2>دخول المستخدم</h2><p>اكتب اسمك واختر دورك.</p><label>اسمك<input id="userName" placeholder="مثلاً: أحمد"></label><label>دورك<select id="userRole"><option value="team">عضو من الفريق</option><option value="worker">عامل الصيانة</option></select></label><button id="saveUserBtn">دخول</button><p id="loginMsg" class="msg"></p></section>
<section id="mainContent" class="hidden">
<div class="topbar"><span id="hello"></span><button id="logoutBtn" class="ghost">خروج</button></div>
<nav><button class="tab active" data-view="newRequest">طلب صيانة</button><button class="tab" data-view="allRequests">كل الطلبات <span id="countBadge">0</span></button><button class="tab" data-view="worker">لوحة العامل</button></nav>
<section id="newRequest" class="view"><div class="card"><h2>طلب صيانة جديد</h2><form id="requestForm"><label>عنوان المشكلة<input id="title" required placeholder="مثلاً: المكيف لا يعمل"></label><label>الموقع<input id="location" required placeholder="مثلاً: الدور الثاني - مكتب الإدارة"></label><label>الأولوية<select id="priority"><option>عادي</option><option>مهم</option><option>عاجل</option></select></label><label>وصف المشكلة<textarea id="description" rows="3" placeholder="اكتب التفاصيل"></textarea></label><label>صور المشكلة<input id="requestImages" type="file" accept="image/*" multiple></label><button type="submit">إرسال الطلب</button></form></div></section>
<section id="allRequests" class="view hidden"><div class="card"><h2>كل الطلبات</h2><div class="filters"><select id="statusFilter"><option value="all">كل الحالات</option><option>جديد</option><option>قيد التنفيذ</option><option>تم التنفيذ</option><option>ملغي</option></select><select id="priorityFilter"><option value="all">كل الأولويات</option><option>عاجل</option><option>مهم</option><option>عادي</option></select><input id="searchBox" placeholder="بحث"></div></div><div id="requestList" class="requestList"></div></section>
<section id="worker" class="view hidden"><div class="card"><h2>لوحة عامل الصيانة</h2><p>العامل يغير الحالة ويرفع صور الإنجاز.</p></div><div id="workerList" class="requestList"></div></section>
</section>
</main>
<dialog id="detailsDialog"><div class="dialogHead"><h2 id="dialogTitle"></h2><button id="closeDialog" class="ghost">إغلاق</button></div><div id="dialogBody"></div></dialog>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<script src="app.js"></script>
</body></html>
