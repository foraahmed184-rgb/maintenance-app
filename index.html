<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>نظام طلبات الصيانة</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>نظام طلبات الصيانة</h1>
      <p>إدارة طلبات الصيانة الداخلية</p>
    </div>
    <div class="top-actions hidden" id="topActions"><button id="notifyBtn" class="ghost">تفعيل الإشعارات</button><button id="logoutBtn" class="ghost">تسجيل خروج</button></div>
  </header>

  <main class="container">
    <section id="loginCard" class="card login-card">
      <h2>دخول المستخدم</h2>
      <p class="muted">اكتب اسمك واختر دورك داخل النظام.</p>
      <label>اسمك</label>
      <input id="nameInput" type="text" placeholder="مثلاً: أحمد" />

      <label>دورك</label>
      <select id="roleInput">
        <option value="member">عضو من الفريق</option>
        <option value="worker">العامل</option>
        <option value="admin">المسؤول</option>
      </select>

      <div id="passwordWrap" class="hidden">
        <label>كلمة المرور</label>
        <input id="passwordInput" type="password" placeholder="كلمة المرور" />
      </div>

      <button id="loginBtn" class="primary">دخول</button>
      <p id="loginError" class="error"></p>
    </section>

    <section id="appView" class="hidden">
      <div class="user-strip card">
        <div>
          <strong id="welcomeText"></strong>
          <p id="roleText" class="muted"></p>
        </div>
      </div>

      <section id="requestFormCard" class="card">
        <h2>إرسال طلب صيانة</h2>
        <label>عنوان المشكلة</label>
        <input id="titleInput" type="text" placeholder="مثلاً: تسريب ماء في الدور الثاني" />

        <label>المكان</label>
        <input id="locationInput" type="text" placeholder="مثلاً: مكتب 3 / المستودع / الحمام" />

        <label>أهمية الطلب</label>
        <select id="priorityInput">
          <option value="normal">عادي</option>
          <option value="important">مهم</option>
          <option value="urgent">مستعجل</option>
        </select>

        <label>وصف المشكلة</label>
        <textarea id="descriptionInput" rows="4" placeholder="اكتب تفاصيل المشكلة..."></textarea>

        <label>صور المشكلة</label>
        <input id="beforeImagesInput" type="file" accept="image/*" multiple />

        <button id="submitRequestBtn" class="primary">إرسال الطلب</button>
        <p id="submitMsg" class="success"></p>
      </section>

      <section class="card notifications-card">
        <div class="list-header">
          <h2>الإشعارات</h2>
          <button id="clearNotifsBtn" class="small-btn">مسح الإشعارات</button>
        </div>
        <div id="notificationsList" class="notifications-list"></div>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>طلبات الصيانة</h2>
          <select id="filterInput">
            <option value="all">كل الطلبات</option>
            <option value="new">جديد</option>
            <option value="progress">قيد التنفيذ</option>
            <option value="done">تم التنفيذ</option>
          </select>
        </div>
        <div id="requestsList" class="requests-list"></div>
      </section>
    </section>
  </main>

  <div id="imageModal" class="modal hidden">
    <button id="closeModal" class="modal-close">×</button>
    <img id="modalImage" alt="صورة مكبرة" />
  </div>

  <script src="app.js"></script>
</body>
</html>
