<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>نظام طلبات الصيانة</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>نظام طلبات الصيانة</h1>
      <p>طلبات الصيانة الداخلية للفريق</p>
    </div>
    <button id="logoutBtn" class="ghost hidden">تسجيل خروج</button>
  </header>

  <main class="container">
    <section id="loginCard" class="card login-card">
      <h2>دخول المستخدم</h2>
      <p class="muted">اكتب اسمك واختر دورك داخل النظام.</p>
      <label>اسمك</label>
      <input id="userName" type="text" placeholder="مثلاً: أحمد" />
      <label>دورك</label>
      <select id="userRole">
        <option value="member">عضو من الفريق</option>
        <option value="worker">عامل الصيانة</option>
        <option value="admin">مسؤول</option>
      </select>
      <div id="passwordWrap" class="hidden">
        <label>كلمة المرور</label>
        <input id="password" type="password" placeholder="كلمة المرور" />
      </div>
      <button id="loginBtn">دخول</button>
      <p class="hint">المسؤول: admin / 1234 — العامل: 0000</p>
    </section>

    <section id="appArea" class="hidden">
      <div class="user-line card">
        <div>
          <strong id="currentUserLabel"></strong>
          <p class="muted" id="roleLabel"></p>
        </div>
        <button id="notifyBtn" class="secondary">تفعيل إشعارات داخلية</button>
      </div>

      <section class="card" id="requestFormCard">
        <h2>إرسال طلب صيانة</h2>
        <div class="grid">
          <div>
            <label>عنوان المشكلة</label>
            <input id="title" type="text" placeholder="مثلاً: مكيف لا يعمل" />
          </div>
          <div>
            <label>الأولوية</label>
            <select id="priority">
              <option value="normal">عادي</option>
              <option value="important">مهم</option>
              <option value="urgent">مستعجل</option>
            </select>
          </div>
        </div>
        <label>وصف المشكلة</label>
        <textarea id="description" rows="4" placeholder="اكتب تفاصيل المشكلة والمكان..."></textarea>
        <label>صور المشكلة (اختياري)</label>
        <input id="images" type="file" accept="image/*" multiple />
        <p class="hint">الصور يتم ضغطها تلقائيًا قبل الإرسال عشان ما يظهر خطأ الحجم.</p>
        <button id="sendBtn">إرسال الطلب</button>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>الطلبات</h2>
          <div class="filters">
            <select id="statusFilter">
              <option value="all">كل الحالات</option>
              <option value="new">جديد</option>
              <option value="progress">قيد التنفيذ</option>
              <option value="done">تم التنفيذ</option>
              <option value="cancelled">ملغي</option>
            </select>
          </div>
        </div>
        <div id="requestsList" class="requests"></div>
      </section>

      <section class="card">
        <h2>الإشعارات داخل التطبيق</h2>
        <div id="notificationsList" class="notifications"></div>
      </section>
    </section>
  </main>

  <div id="imageModal" class="modal hidden">
    <button id="closeModal" class="close">×</button>
    <img id="modalImage" alt="صورة مكبرة" />
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
