<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>نظام الصيانة</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="box">
<h1>نظام طلبات الصيانة</h1>

<div id="login">
<input id="user" placeholder="اسم المستخدم">
<select id="role">
<option value="member">عضو فريق</option>
<option value="worker">عامل</option>
<option value="admin">مسؤول</option>
</select>
<input id="pass" type="password" placeholder="الرمز">
<button onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">
<h2 id="welcome"></h2>

<div id="requestBox">
<input id="title" placeholder="عنوان المشكلة">
<textarea id="desc" placeholder="وصف المشكلة"></textarea>
<select id="priority">
<option>عادي</option>
<option>مهم</option>
<option>مستعجل</option>
</select>
<button onclick="addRequest()">إرسال الطلب</button>
</div>

<div id="requests"></div>

<button onclick="logout()">خروج</button>
</div>

<script src="app.js"></script>
</body>
</html>
