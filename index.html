<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>نظام الصيانة</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
<h1>نظام طلبات الصيانة</h1>
<button id="logoutBtn" class="hidden">خروج</button>
</header>

<section id="loginBox" class="card">
<h2>تسجيل الدخول</h2>

<label>اسم المستخدم</label>
<input id="username">

<label>نوع الحساب</label>
<select id="role">
<option value="member">عضو فريق</option>
<option value="worker">عامل</option>
<option value="admin">مسؤول</option>
</select>

<div id="passwordArea" class="hidden">
<label>الرمز</label>
<input id="password" type="password">
</div>

<button id="loginBtn">دخول</button>
</section>

<section id="app" class="hidden">

<div id="workerNotice" class="card hidden">
<h3>د ساتنې غوښتنې</h3>
<p>دا د کارګر پاڼه ده.</p>
</div>

<section id="newRequest" class="card">
<h2>طلب جديد</h2>

<input id="title" placeholder="عنوان المشكلة">
<textarea id="desc" placeholder="وصف المشكلة"></textarea>

<select id="priority">
<option>عادي</option>
<option>مهم</option>
<option>مستعجل</option>
</select>

<label>صور</label>
<input id="images" type="file" accept="image/*" multiple>

<label>فيديو</label>
<input id="video" type="file" accept="video/*">

<div class="voice">
<button id="startVoice">بدء تسجيل</button>
<button id="stopVoice" class="hidden">إيقاف</button>
<audio id="voicePreview" controls class="hidden"></audio>
</div>

<button id="sendBtn">إرسال الطلب</button>
</section>

<section class="card">
<h2>الطلبات</h2>
<div id="requests"></div>
</section>

<section class="card">
<h2>الإشعارات</h2>
<div id="notifications"></div>
</section>

</section>

<div id="modal" class="hidden">
<img id="modalImg">
</div>

<script type="module" src="app.js"></script>
</body>
</html>
